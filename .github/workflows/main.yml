name: CI

on:
  push:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: strong_pg_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d strong_pg_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      STRONG_PG_TEST_DATABASE_RESET: '1'
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/strong_pg_test

    steps:
      - uses: actions/checkout@v2
    
      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      
      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Test
        run: pnpm test
        
      - name: Build
        run: pnpm run build
      
      - name: Deploy
        uses: s0/git-publish-subdir-action@v2.5.1
        env:
          REPO: self
          BRANCH: package
          FOLDER: build
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "Deploy {sha}:\n{msg}"
